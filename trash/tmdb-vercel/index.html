<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMDb 电影(Vercel)</title>
    <link rel="stylesheet" href="../../src/css/common.css">
    <style>
        body {
            background: #0a0f1c;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 24px;
            color: #edf2f7;
        }
        .wrapper {
            max-width: 1280px;
            margin: 0 auto;
        }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 40px;
            padding: 12px 28px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #2563eb;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin: 32px 0;
        }
        .movie-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 16px;
        }
        .movie-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0 0 6px;
        }
        .rating {
            background: #fbbf24;
            color: #0f172a;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
        }
        .overview {
            font-size: 0.8rem;
            color: #cbd5e1;
            margin-top: 10px;
        }
        pre {
            background: #0f172a;
            padding: 16px;
            border-radius: 16px;
            overflow-x: auto;
            font-size: 12px;
        }
        .error-box {
            background: #7f1a1a;
            padding: 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body data-nav-current="tmdb-vercel">
<div class="wrapper">
    <h1>🎬 TMDb 发现电影</h1>
    <button id="fetchBtn">获取电影</button>
    
    <div id="movieGrid" class="card-grid">
        <div>点击按钮获取电影数据</div>
    </div>
    
    <h3>📋 原始 JSON 响应</h3>
    <pre id="rawJson">暂无数据</pre>
</div>

<script src="../../src/js/nav.js"></script>
<script>
    const fetchBtn = document.getElementById('fetchBtn');
    const movieGrid = document.getElementById('movieGrid');
    const rawJsonPre = document.getElementById('rawJson');
    
    async function fetchMovies() {
        // 显示加载状态
        movieGrid.innerHTML = '<div>⏳ 加载中...</div>';
        rawJsonPre.textContent = '加载中...';
        
        try {
            // 通过代理请求 TMDB API（注意：不需要写 api_key）
            const url = '/api/tmdb/discover/movie?sort_by=popularity.desc&page=1&language=zh-CN';
            
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${await response.text()}`);
            }
            
            const data = await response.json();
            
            // 显示原始 JSON
            rawJsonPre.textContent = JSON.stringify(data, null, 2);
            
            // 显示电影卡片
            if (data.results && data.results.length > 0) {
                renderMovies(data.results);
            } else {
                movieGrid.innerHTML = '<div>没有找到电影</div>';
            }
            
        } catch (error) {
            console.error('错误:', error);
            movieGrid.innerHTML = `<div class="error-box">❌ 请求失败: ${error.message}<br><br>请检查：<br>1. Vercel 环境变量 TMDB_ACCESS_TOKEN 是否已设置<br>2. api/tmdb.js 文件是否存在</div>`;
            rawJsonPre.textContent = `错误: ${error.message}`;
        }
    }
    
    function renderMovies(movies) {
        const html = movies.map(movie => `
            <div class="movie-card">
                <div class="movie-title">${escapeHtml(movie.title || '无题')}</div>
                <div class="rating">⭐ ${movie.vote_average?.toFixed(1) || '?'}</div>
                <div class="overview">${escapeHtml(movie.overview?.substring(0, 150) || '暂无简介')}</div>
                ${movie.poster_path ? `<img src="https://image.tmdb.org/t/p/w185${movie.poster_path}" style="width:100%; border-radius:12px; margin-top:12px;">` : ''}
            </div>
        `).join('');
        movieGrid.innerHTML = html;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    fetchBtn.addEventListener('click', fetchMovies);
</script>
</body>
</html>
