<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网站导航</title>
  <link rel="stylesheet" href="../../src/css/common.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; background: #f5f7fa;
      display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .card {
      background: #fff; border-radius: 20px; padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,.08); max-width: 560px; width: 100%;
    }
    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    h1 { font-size: 22px; color: #333; }
    .back { text-decoration: none; color: #667eea; font-size: 14px; }
    .back:hover { text-decoration: underline; }
    .sites { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .site {
      display: flex; align-items: center; gap: 12px; padding: 16px;
      border-radius: 12px; text-decoration: none; color: #333;
      background: #f8f9ff; transition: background .15s, transform .15s; font-weight: 500;
    }
    .site:hover { background: #eef0ff; transform: translateY(-2px); }
    .icon { font-size: 24px; }
    .hint {
      margin-top: 24px; padding: 14px; border-radius: 10px;
      background: #fff8e1; color: #8a6d2b; font-size: 13px; line-height: 1.6;
    }
  </style>
</head>
<body data-nav-current="navigation">
  <div class="card">
    <div class="top">
      <h1>🔗 网站导航</h1>
    </div>
    <div class="sites">
      <a href="https://www.baidu.com" class="site" target="_blank" rel="noopener">
        <span class="icon">🔍</span> 百度
      </a>
      <a href="https://www.bilibili.com" class="site" target="_blank" rel="noopener">
        <span class="icon">📺</span> 哔哩哔哩
      </a>
      <a href="https://www.google.com" class="site" target="_blank" rel="noopener">
        <span class="icon">🌐</span> Google
      </a>
      <a href="https://github.com" class="site" target="_blank" rel="noopener">
        <span class="icon">🐙</span> GitHub
      </a>
    </div>
    <div class="hint">
      💡 提示：打开 <code>navigation.html</code>，在 <code>&lt;div class="sites"&gt;</code> 里面照着格式添加新的站点链接即可。
    </div>
  </div>
  <script src="../../src/js/nav.js"></script>
</body>
</html>
