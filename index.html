<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Show me the project——2026</title>
  <link rel="stylesheet" href="src/css/common.css">
  <style>
    /* ========== 首页特有样式 ========== */
    .hero {
      text-align: center;
      padding: 80px 24px 40px;
      position: relative;
    }
    .hero__title {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--color-secondary);
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 20px;
    }
    .hero__desc {
      font-size: 0.95rem;
      color: var(--color-text-light);
      max-width: 600px;
      margin: 0 auto 8px;
      line-height: 1.8;
    }
    .hero__desc blockquote {
      margin: 20px 0 0;
      padding: 0;
      border: none;
      font-style: italic;
      color: var(--color-text-muted);
      font-size: 0.85rem;
      line-height: 1.8;
    }
    .hero__desc blockquote .attr {
      font-style: normal;
      color: var(--color-text-light);
      font-size: 0.78rem;
    }
    .hero__desc .reflect {
      display: block;
      margin-top: 12px;
      font-style: italic;
      color: var(--color-primary);
      font-size: 0.85rem;
    }

    /* 装饰 */
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-border), transparent);
    }
    @media (max-width: 640px) {
      .hero__title { font-size: 1.8rem; }
      .hero { padding: 50px 16px 30px; }
    }
  </style>
</head>
<body data-nav-current="index">

  <!-- ========== Hero ========== -->
  <section class="hero">
    <h1 class="hero__title">Show me the project——2026</h1>
    <p class="hero__desc">
      <blockquote>
        "Talk is cheap. Show me the code."
        <br><span class="attr">—— Linus Torvalds, 2000</span>
      </blockquote>
      <span class="reflect">当AI让代码变得唾手可得，我们迎来的，是一个创意为王的黄金时代。</span>
    </p>
  </section>

  <!-- ========== 导航组件 ========== -->
  <script src="src/js/nav.js"></script>
</body>
</html>
