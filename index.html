<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Show me the project——2026</title>
  <link rel="stylesheet" href="src/css/common.css">
  <style>
    /* ========== 首页特有样式 ========== */
    .hero {
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
      overflow: hidden;
    }
    /* 科技背景：深色渐变 + 网格 */
    .hero {
      background:
        linear-gradient(180deg, rgba(61,64,91,0.02) 0%, rgba(61,64,91,0.06) 100%),
        repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(61,64,91,0.04) 59px, rgba(61,64,91,0.04) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(61,64,91,0.04) 59px, rgba(61,64,91,0.04) 60px);
      background-blend-mode: normal, multiply, multiply;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(129,178,154,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(224,122,95,0.08) 0%, transparent 50%);
      animation: heroShift 20s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes heroShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-5%, 3%); }
    }
    .hero > * { position: relative; z-index: 1; }

    .hero__title {
      font-size: 3.5rem;
      font-weight: 800;
      color: var(--color-secondary);
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 64px;
      background: linear-gradient(135deg, var(--color-secondary) 0%, var(--color-primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero__title span.year {
      display: block;
      font-size: 0.5em;
      letter-spacing: 0.25em;
      margin-top: 24px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero__desc {
      font-size: 0.95rem;
      color: var(--color-text-light);
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 72px;
      line-height: 1.8;
    }
    .hero__desc blockquote {
      margin: 0;
      padding: 0;
      border: none;
      font-style: italic;
      color: var(--color-text-muted);
      font-size: 0.85rem;
      line-height: 1.8;
    }
    .hero__desc blockquote .attr {
      font-style: normal;
      color: var(--color-text-light);
      font-size: 0.78rem;
    }
    .hero__desc .reflect {
      display: block;
      font-style: italic;
      color: var(--color-primary);
      font-size: 0.95rem;
      font-weight: 500;
    }

    /* 装饰 */
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-primary-light), transparent);
      opacity: 0.4;
    }
    @media (max-width: 640px) {
      .hero { padding: 80px 16px 50px; }
      .hero__title { font-size: 2.2rem; }
      .hero__desc { font-size: 0.88rem; gap: 56px; }
      .hero__desc .reflect { font-size: 0.88rem; }
    }
  </style>
</head>
<body data-nav-current="index">

  <!-- ========== Hero ========== -->
  <section class="hero">
    <h1 class="hero__title">Show me the project<span class="year">—— 2026</span></h1>
    <p class="hero__desc">
      <blockquote>
        "Talk is cheap. Show me the code."
        <br><span class="attr">—— Linus Torvalds, 2000</span>
      </blockquote>
      <span class="reflect">当AI让代码变得唾手可得，<br>我们的注意力该放在何处？</span>
    </p>
  </section>

  <!-- ========== 导航组件 ========== -->
  <script src="src/js/nav.js"></script>
</body>
</html>
