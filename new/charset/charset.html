<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字符编码查看器</title>
  <link rel="stylesheet" href="src/css/common.css">
  <style>
    .charset-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .input-section {
      margin-bottom: 32px;
    }
    .input-section .input {
      font-size: 1rem;
      padding: 16px 20px;
      margin-bottom: 12px;
      resize: vertical;
      min-height: 60px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-encode {
      padding: 10px 28px;
      font-size: 1rem;
    }
    .btn-test {
      padding: 10px 28px;
      font-size: 1rem;
      background: var(--color-secondary);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-family: var(--font-sans);
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-test:hover { opacity: 0.85; }
    .results { display: none; }
    .results.visible { display: block; }

    /* 紧凑统计行 */
    .summary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 32px;
      padding: 16px 20px;
      background: var(--color-bg-warm);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: var(--color-text-light);
    }
    .summary-item strong {
      color: var(--color-primary);
      font-size: 1.1rem;
      margin-right: 4px;
    }

    /* 紧凑编码详情 */
    .enc-group {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .enc-group__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: var(--color-bg-warm);
      border-bottom: 1px solid var(--color-border);
      cursor: pointer;
      user-select: none;
      gap: 8px;
    }
    .enc-group__title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--color-secondary);
    }
    .enc-group__info {
      font-size: 0.78rem;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }
    .enc-group__body {
      padding: 0;
      transition: max-height 0.2s;
    }
    .enc-group__body.collapsed {
      max-height: 0;
      overflow: hidden;
    }
    .enc-group__body {
      max-height: 600px;
    }
    .hex-display {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--color-text);
      background: var(--color-bg-warm);
      padding: 12px 16px;
      word-break: break-all;
      line-height: 1.7;
      white-space: pre-wrap;
      border-top: 1px solid var(--color-border);
    }
    .hex-display.dec {
      color: var(--color-text-muted);
      font-size: 0.72rem;
      padding: 8px 16px;
    }

    /* 自动测试结果面板 */
    .test-panel {
      display: none;
      margin-top: 20px;
      padding: 16px 20px;
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: 1.8;
    }
    .test-panel.visible { display: block; }
    .test-panel .pass { color: var(--color-accent-dark); }
    .test-panel .fail { color: var(--color-primary); }
    .test-panel .skip { color: var(--color-text-muted); }
  </style>
</head>
<body data-nav-current="index">

  <header class="page-header">
    <span class="page-header__icon">🔤</span>
    <h1 class="page-header__title">字符编码查看器</h1>
    <p class="page-header__subtitle">输入文本，查看不同编码下的字节序列。</p>
  </header>

  <div class="charset-container">

    <div class="input-section">
      <textarea class="input" id="textInput" placeholder="在这里输入文本…" rows="3"></textarea>
      <div class="btn-row">
        <button class="btn btn--primary btn-encode" id="btnEncode">查看编码</button>
        <button class="btn-test" id="btnAutoTest">自动测试</button>
      </div>
    </div>

    <div class="results" id="results">
      <div class="summary-row" id="charSummary"></div>
      <div id="encDetails"></div>
    </div>

    <div class="test-panel" id="testPanel"></div>

  </div>

  <script src="src/js/nav.js"></script>

  <script>
  (function () {
    'use strict';

    const textInput = document.getElementById('textInput');
    const btnEncode = document.getElementById('btnEncode');
    const results = document.getElementById('results');
    const charSummary = document.getElementById('charSummary');
    const encDetails = document.getElementById('encDetails');

    // ---- UTF-16LE 编码（原生支持）----
    function encodeUTF16LE(str) {
      const encoder = new TextEncoder('utf-16le');
      return encoder.encode(str);
    }

    // ---- UTF-8 编码（原生支持）----
    function encodeUTF8(str) {
      const encoder = new TextEncoder('utf-8');
      return encoder.encode(str);
    }

    // ---- ASCII ----
    // 保留所有字节位置（含非 ASCII 的占位符），用于对齐展示
    function encodeASCII(str) {
      const bytes = [];
      for (let i = 0; i < str.length; i++) {
        const code = str.charCodeAt(i);
        if (code <= 127) {
          bytes.push(code); // 有效 ASCII
        } else {
          bytes.push(0x3F); // 非 ASCII 用 ? (0x3F) 替代
        }
      }
      return bytes;
    }

    // ---- GBK 近似模拟 ----
    // 原理：CJK 字符按 Unicode 码点近似映射到 GBK 编码区域
    function encodeGBK(str) {
      const bytes = [];
      for (let i = 0; i < str.length; i++) {
        const cp = str.codePointAt(i);
        if (cp <= 0x7F) {
          // ASCII 字符：单字节相同
          bytes.push(cp);
        } else if (cp >= 0x4E00 && cp <= 0x9FFF) {
          // CJK 统一汉字：GBK 从 0xB0A1 开始，Unicode 从 0x4E00 开始
          // 近似偏移映射
          const offset = cp - 0x4E00;
          const high = 0xB0 + (offset / 94) | 0;
          const low = (offset % 94);
          bytes.push(Math.min(high, 0xF9));
          bytes.push(0xA1 + low);
          if (cp > 0xFFFF) i++; // 跳过 surrogate
        } else if (cp >= 0x3000 && cp <= 0x303F) {
          // CJK 符号
          const offset = cp - 0x3000;
          bytes.push(0xB0);
          bytes.push(0xA1 + offset);
        } else if (cp >= 0xAC00 && cp <= 0xD7A3) {
          // 韩文字母
          const offset = cp - 0xAC00;
          bytes.push(0xB9 + (offset / 588) | 0);
          bytes.push(0xA1 + (offset % 588));
        } else if (cp >= 0x0080 && cp <= 0x00FF) {
          // Latin-1 补充：近似为 Latin-1 单字节
          bytes.push(cp);
        } else {
          // 其他：用 UTF-8 编码模拟（实际 GBK 无法表示这些字符，用 ? 替代）
          bytes.push(0x3F);
          if (cp > 0xFFFF) i++;
        }
      }
      return bytes;
    }

    // ---- 工具函数 ----
    function bytesToHex(bytes, len) {
      return bytes.slice(0, len || bytes.length).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
    }

    function bytesToString(bytes, len) {
      return bytes.slice(0, len || bytes.length).join(', ');
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ---- 主逻辑 ----
    btnEncode.addEventListener('click', function () {
      const text = textInput.value;
      if (!text) return;

      const len = text.length;
      const byteCount = new Blob([text]).size;

      const utf8Bytes = encodeUTF8(text);
      const utf16Bytes = encodeUTF16LE(text);
      const asciiBytes = encodeASCII(text);
      const gbkBytes = encodeGBK(text);

      // 统计 ASCII 有效字符数
      const asciiValid = asciiBytes.filter(b => b !== 0x3F || text.charCodeAt(asciiBytes.indexOf(b)) <= 127).length;
      const asciiReplaced = asciiBytes.filter(b => b === 0x3F).length;
      // 更准确：重新统计
      const asciiGood = [];
      for (let i = 0; i < text.length; i++) {
        if (text.charCodeAt(i) <= 127) asciiGood.push(i);
      }

      charSummary.innerHTML = `
        <div class="summary-card">
          <div class="summary-card__value">${len}</div>
          <div class="summary-card__label">JS 字符数</div>
        </div>
        <div class="summary-card">
          <div class="summary-card__value">${utf8Bytes.length}</div>
          <div class="summary-card__label">UTF-8 字节数</div>
        </div>
        <div class="summary-card">
          <div class="summary-card__value">${utf16Bytes.length}</div>
          <div class="summary-card__label">UTF-16 字节数</div>
        </div>
        <div class="summary-card">
          <div class="summary-card__value">${gbkBytes.length}</div>
          <div class="summary-card__label">GBK 字节数（近似）</div>
        </div>
        <div class="summary-card">
          <div class="summary-card__value">${asciiOnly.length}</div>
          <div class="summary-card__label">ASCII 字节数</div>
        </div>
        <div class="summary-card">
          <div class="summary-card__value">${byteCount}</div>
          <div class="summary-card__label">Blob 实际字节数</div>
        </div>
      `;

      // 编码详情
      const maxBytes = Math.max(utf8Bytes.length, utf16Bytes.length, gbkBytes.length, asciiBytes.length);

      encDetails.innerHTML = `
        <!-- UTF-8 -->
        <div class="enc-group">
          <div class="enc-group__title">UTF-8</div>
          <div class="enc-group__info">${utf8Bytes.length} 字节 — 变长编码，1~4 字节/字符</div>
          <div class="hex-display">${escapeHtml(bytesToHex(utf8Bytes))}</div>
          <div class="hex-display" style="margin-top:8px;color:var(--color-text-light);font-size:0.75rem;">
            十进制: ${escapeHtml(bytesToString(utf8Bytes))}
          </div>
        </div>

        <!-- UTF-16LE -->
        <div class="enc-group">
          <div class="enc-group__title">UTF-16 LE (Unicode)</div>
          <div class="enc-group__info">${utf16Bytes.length} 字节 — 固定 2 字节/字符（BMP）或 4 字节（辅助平面）</div>
          <div class="hex-display">${escapeHtml(bytesToHex(utf16Bytes))}</div>
          <div class="hex-display" style="margin-top:8px;color:var(--color-text-light);font-size:0.75rem;">
            十进制: ${escapeHtml(bytesToString(utf16Bytes))}
          </div>
        </div>

        <!-- GBK -->
        <div class="enc-group">
          <div class="enc-group__title">GBK（近似模拟）</div>
          <div class="enc-group__info">${gbkBytes.length} 字节 — 双字节编码，CJK 字符 ~ 2 字节/字符</div>
          <div class="hex-display">${escapeHtml(bytesToHex(gbkBytes))}</div>
          <div class="hex-display" style="margin-top:8px;color:var(--color-text-light);font-size:0.75rem;">
            十进制: ${escapeHtml(bytesToString(gbkBytes))}
          </div>
        </div>

        <!-- ASCII -->
        <div class="enc-group">
          <div class="enc-group__title">ASCII</div>
          <div class="enc-group__info">${asciiOnly.length} / ${len} 字符可编码 — 仅 0x00~0x7F，非 ASCII 字符以 ? (0x3F) 替代</div>
          <div class="hex-display">${escapeHtml(bytesToHex(asciiBytes, maxBytes))}</div>
          <div class="hex-display" style="margin-top:8px;color:var(--color-text-light);font-size:0.75rem;">
            十进制: ${escapeHtml(bytesToString(asciiBytes, maxBytes))}
          </div>
        </div>
      `;

      results.classList.add('visible');
    });
  })();
  </script>
</body>
</html>
