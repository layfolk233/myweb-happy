<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字符编码查看器</title>
  <link rel="stylesheet" href="../src/css/common.css">
  <style>
    .charset-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .input-section {
      margin-bottom: 32px;
    }
    .input-section .input {
      font-size: 1rem;
      padding: 16px 20px;
      margin-bottom: 12px;
      resize: vertical;
      min-height: 60px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-encode {
      padding: 10px 28px;
      font-size: 1rem;
    }
    .btn-test {
      padding: 10px 28px;
      font-size: 1rem;
      background: var(--color-secondary);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-family: var(--font-sans);
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-test:hover { opacity: 0.85; }
    .results { display: none; }
    .results.visible { display: block; }

    /* 紧凑统计行 */
    .summary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 16px 20px;
      background: var(--color-bg-warm);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: var(--color-text-light);
    }
    .summary-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
      flex: 1;
    }
    .summary-item strong {
      color: var(--color-primary);
      font-size: 1.3rem;
      font-weight: 700;
    }
    .summary-item span {
      font-size: 0.75rem;
      margin-top: 2px;
    }

    /* 紧凑编码详情 */
    .enc-group {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .enc-group__title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: var(--color-bg-warm);
      border-bottom: 1px solid var(--color-border);
    }
    .enc-group__label {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--color-secondary);
    }
    .enc-group__info {
      font-size: 0.78rem;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }
    .enc-group__body {
      padding: 0;
      transition: max-height 0.2s;
    }
    .enc-group__body.collapsed {
      max-height: 0;
      overflow: hidden;
    }
    .enc-group__body {
      max-height: 600px;
    }
    .hex-display {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--color-text);
      background: var(--color-bg-warm);
      padding: 12px 16px;
      word-break: break-all;
      line-height: 1.7;
      white-space: pre-wrap;
      border-top: 1px solid var(--color-border);
    }
    .hex-display.dec {
      color: var(--color-text-muted);
      font-size: 0.72rem;
      padding: 8px 16px;
    }

    /* 自动测试结果面板 */
    .test-panel {
      display: none;
      margin-top: 20px;
      padding: 16px 20px;
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: 1.8;
    }
    .test-panel.visible { display: block; }
    .test-panel .pass { color: var(--color-accent-dark); }
    .test-panel .fail { color: var(--color-primary); }
    .test-panel .skip { color: var(--color-text-muted); }
  </style>
</head>
<body data-nav-current="index">

  <header class="page-header">
    <span class="page-header__icon">🔤</span>
    <h1 class="page-header__title">字符编码查看器</h1>
    <p class="page-header__subtitle">输入文本，查看不同编码下的字节序列。</p>
  </header>

  <div class="charset-container">

    <div class="input-section">
      <textarea class="input" id="textInput" placeholder="在这里输入文本…" rows="3"></textarea>
      <div class="btn-row">
        <button class="btn btn--primary btn-encode" id="btnEncode">查看编码</button>
        <button class="btn-test" id="btnAutoTest">自动测试</button>
      </div>
    </div>

    <div class="results" id="results">
      <div class="summary-row" id="charSummary"></div>
      <div id="encDetails"></div>
    </div>

    <div class="test-panel" id="testPanel"></div>

  </div>

  <script src="../src/js/nav.js"></script>

  <script>
  (function () {
    'use strict';

    const textInput = document.getElementById('textInput');
    const btnEncode = document.getElementById('btnEncode');
    const btnAutoTest = document.getElementById('btnAutoTest');
    const results = document.getElementById('results');
    const charSummary = document.getElementById('charSummary');
    const encDetails = document.getElementById('encDetails');
    const testPanel = document.getElementById('testPanel');

    // ---- UTF-16LE 编码 ----
    function encodeUTF16LE(str) {
      const encoder = new TextEncoder('utf-16le');
      return encoder.encode(str);
    }

    // ---- UTF-8 编码 ----
    function encodeUTF8(str) {
      const encoder = new TextEncoder('utf-8');
      return encoder.encode(str);
    }

    // ---- ASCII 近似 ----
    // 非 ASCII 字符用 ? (0x3F) 替代
    function encodeASCII(str) {
      const bytes = [];
      for (let i = 0; i < str.length; i++) {
        const code = str.charCodeAt(i);
        if (code <= 127) {
          bytes.push(code);
        } else {
          bytes.push(0x3F);
        }
      }
      return bytes;
    }

    // ---- GBK 近似模拟 ----
    function encodeGBK(str) {
      const bytes = [];
      for (let i = 0; i < str.length; i++) {
        const cp = str.codePointAt(i);
        if (cp <= 0x7F) {
          bytes.push(cp);
        } else if (cp >= 0x4E00 && cp <= 0x9FA5) {
          // CJK 统一汉字基本区
          const offset = cp - 0x4E00;
          const row = 0xB0 + (offset / 94) | 0;
          const col = offset % 94;
          bytes.push(Math.min(row, 0xF9));
          bytes.push(0xA1 + col);
          if (cp > 0xFFFF) i++;
        } else if (cp >= 0x3000 && cp <= 0x303F) {
          const offset = cp - 0x3000;
          bytes.push(0xB0);
          bytes.push(0xA1 + offset);
        } else if (cp >= 0xAC00 && cp <= 0xD7A3) {
          const offset = cp - 0xAC00;
          bytes.push(0xB9 + (offset / 588) | 0);
          bytes.push(0xA1 + (offset % 588));
        } else if (cp >= 0x0080 && cp <= 0x00FF) {
          bytes.push(cp);
        } else {
          bytes.push(0x3F);
          if (cp > 0xFFFF) i++;
        }
      }
      return bytes;
    }

    // ---- 工具函数 ----
    function bytesToHex(bytes, len) {
      return bytes.slice(0, len || bytes.length).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
    }

    function bytesToString(bytes, len) {
      return bytes.slice(0, len || bytes.length).join(', ');
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function countASCIIChars(text) {
      let count = 0;
      for (let i = 0; i < text.length; i++) {
        if (text.charCodeAt(i) <= 127) count++;
      }
      return count;
    }

    // ---- 主逻辑：查看编码 ----
    btnEncode.addEventListener('click', function () {
      const text = textInput.value;
      if (!text) return;

      const len = text.length;
      const byteCount = new Blob([text]).size;
      const asciiChars = countASCIIChars(text);

      const utf8Bytes = encodeUTF8(text);
      const utf16Bytes = encodeUTF16LE(text);
      const asciiBytes = encodeASCII(text);
      const gbkBytes = encodeGBK(text);

      // 统计行
      charSummary.innerHTML = `
        <div class="summary-item"><strong>${len}</strong><span>JS 字符数</span></div>
        <div class="summary-item"><strong>${utf8Bytes.length}</strong><span>UTF-8 字节数</span></div>
        <div class="summary-item"><strong>${utf16Bytes.length}</strong><span>UTF-16 字节数</span></div>
        <div class="summary-item"><strong>${gbkBytes.length}</strong><span>GBK 字节数（近似）</span></div>
        <div class="summary-item"><strong>${asciiBytes.length}</strong><span>ASCII 字节数</span></div>
        <div class="summary-item"><strong>${byteCount}</strong><span>Blob 实际字节数</span></div>
      `;

      // 编码详情
      encDetails.innerHTML = `
        <div class="enc-group">
          <div class="enc-group__title">
            <span class="enc-group__label">UTF-8</span>
            <span class="enc-group__info">${utf8Bytes.length} 字节 — 变长编码，1~4 字节/字符</span>
          </div>
          <div class="hex-display">${escapeHtml(bytesToHex(utf8Bytes))}</div>
          <div class="hex-display dec">十进制: ${escapeHtml(bytesToString(utf8Bytes))}</div>
        </div>

        <div class="enc-group">
          <div class="enc-group__title">
            <span class="enc-group__label">UTF-16 LE (Unicode)</span>
            <span class="enc-group__info">${utf16Bytes.length} 字节 — 固定 2 字节/字符（BMP）或 4 字节（辅助平面）</span>
          </div>
          <div class="hex-display">${escapeHtml(bytesToHex(utf16Bytes))}</div>
          <div class="hex-display dec">十进制: ${escapeHtml(bytesToString(utf16Bytes))}</div>
        </div>

        <div class="enc-group">
          <div class="enc-group__title">
            <span class="enc-group__label">GBK（近似模拟）</span>
            <span class="enc-group__info">${gbkBytes.length} 字节 — 双字节编码，CJK 字符 ~ 2 字节/字符</span>
          </div>
          <div class="hex-display">${escapeHtml(bytesToHex(gbkBytes))}</div>
          <div class="hex-display dec">十进制: ${escapeHtml(bytesToString(gbkBytes))}</div>
        </div>

        <div class="enc-group">
          <div class="enc-group__title">
            <span class="enc-group__label">ASCII</span>
            <span class="enc-group__info">${asciiChars} / ${len} 字符可编码 — 仅 0x00~0x7F，非 ASCII 以 ? (0x3F) 替代</span>
          </div>
          <div class="hex-display">${escapeHtml(bytesToHex(asciiBytes))}</div>
          <div class="hex-display dec">十进制: ${escapeHtml(bytesToString(asciiBytes))}</div>
        </div>
      `;

      results.classList.add('visible');
      testPanel.classList.remove('visible');
      testPanel.innerHTML = '';
    });

    // ---- 自动测试功能 ----
    btnAutoTest.addEventListener('click', function () {
      const text = textInput.value;
      if (!text) {
        testPanel.innerHTML = '<span class="fail">❌ 请先输入测试文本</span>';
        testPanel.classList.add('visible');
        return;
      }

      const utf8Bytes = encodeUTF8(text);
      const utf16Bytes = encodeUTF16LE(text);
      const asciiBytes = encodeASCII(text);
      const gbkBytes = encodeGBK(text);
      const asciiChars = countASCIIChars(text);

      let lines = [];
      let allPassed = true;

      // 测试 1：UTF-8 字节数验证
      {
        const expected = new Blob([text]).size;
        // Blob 实际使用 UTF-8，所以 byteCount 应该等于 utf8Bytes.length
        const match = utf8Bytes.length === expected;
        lines.push(match
          ? `<span class="pass">✅ 测试 1 [UTF-8 字节数]</span> — 编码结果 ${utf8Bytes.length} 字节，Blob 验证 ${expected} 字节，<b>匹配</b>`
          : `<span class="fail">❌ 测试 1 [UTF-8 字节数]</span> — 编码结果 ${utf8Bytes.length} 字节，Blob 验证 ${expected} 字节，<b>不匹配</b>`);
        if (!match) allPassed = false;
      }

      // 测试 2：UTF-16LE 每个 BMP 字符都是 2 字节
      {
        let valid = true;
        let sampleFail = '';
        for (let i = 0; i < text.length && sampleFail.length < 20; i++) {
          const cp = text.codePointAt(i);
          const expectedSize = cp <= 0xFFFF ? 2 : 4;
          // 累计估算字节数
          if (cp > 0xFFFF) i++;
        }
        const totalExpected = Array.from(text).length * 2 + countSurrogates(text);
        const match = utf16Bytes.length === totalExpected;
        lines.push(match
          ? `<span class="pass">✅ 测试 2 [UTF-16LE 字节数]</span> — ${utf16Bytes.length} 字节，符合字符数×2，<b>通过</b>`
          : `<span class="fail">❌ 测试 2 [UTF-16LE 字节数]</span> — ${utf16Bytes.length} 字节，预期 ${totalExpected}，<b>不匹配</b>`);
        if (!match) allPassed = false;
      }

      // 测试 3：ASCII 字符在 UTF-8 中占 1 字节
      {
        let match = true;
        let failText = '';
        for (let i = 0; i < text.length && failText.length < 30; i++) {
          const cp = text.charCodeAt(i);
          if (cp <= 127) {
            // UTF-8 应该只有 1 字节，检查实际编码
          }
        }
        // 更直接：用 TextEncoder 逐个字符验证
        let total = 0;
        for (let i = 0; i < text.length; i++) {
          const t = text[i];
          total += new TextEncoder().encode(t).length;
        }
        const ok = total === utf8Bytes.length;
        lines.push(ok
          ? `<span class="pass">✅ 测试 3 [ASCII 单字节]</span> — ASCII 字符在 UTF-8 中各占 1 字节，<b>通过</b>`
          : `<span class="fail">❌ 测试 3 [ASCII 单字节]</span> — <b>不通过</b>`);
        if (!ok) allPassed = false;
      }

      // 测试 4：GBK 编码长度合理性
      {
        const expectedGBK = Math.max(asciiChars, Math.ceil((text.length - asciiChars) * 2));
        const ok = gbkBytes.length >= asciiChars && gbkBytes.length <= expectedGBK + 10;
        lines.push(ok
          ? `<span class="pass">✅ 测试 4 [GBK 长度合理性]</span> — ${gbkBytes.length} 字节 ≥ ASCII 字符数 ${asciiChars}，<b>合理</b>`
          : `<span class="fail">❌ 测试 4 [GBK 长度合理性]</span> — ${gbkBytes.length} 字节 < ${asciiChars}，<b>不合理</b>`);
        if (!ok) allPassed = false;
      }

      // 测试 5：GBK 中 ASCII 部分与 UTF-8 一致
      {
        let ok = true;
        let i = 0;
        while (i < text.length && ok) {
          const cp = text.codePointAt(i);
          if (cp <= 0x7F) {
            if (gbkBytes[i] !== cp) ok = false;
          } else {
            // GBK 多字节，跳过对应字节
          }
          i++;
        }
        lines.push(ok
          ? `<span class="pass">✅ 测试 5 [GBK ASCII 对齐]</span> — ASCII 字符在 GBK 中单字节相同，<b>通过</b>`
          : `<span class="fail">❌ 测试 5 [GBK ASCII 对齐]</span> — 存在不匹配的 ASCII 字节，<b>不通过</b>`);
        if (!ok) allPassed = false;
      }

      // 测试 6：UTF-8 编码可逆（编解码一致性）
      {
        const decoder = new TextDecoder('utf-8');
        const roundtrip = decoder.decode(utf8Bytes);
        const ok = roundtrip === text;
        lines.push(ok
          ? `<span class="pass">✅ 测试 6 [UTF-8 可逆性]</span> — 编码→解码恢复原文，<b>通过</b>`
          : `<span class="fail">❌ 测试 6 [UTF-8 可逆性]</span> — 解码结果: "${escapeHtml(roundtrip.substring(0, 30))}"，<b>不通过</b>`);
        if (!ok) allPassed = false;
      }

      // 测试 7：UTF-16LE 编码可逆
      {
        const decoder = new TextDecoder('utf-16le');
        const roundtrip = decoder.decode(utf16Bytes);
        const ok = roundtrip === text;
        lines.push(ok
          ? `<span class="pass">✅ 测试 7 [UTF-16LE 可逆性]</span> — 编码→解码恢复原文，<b>通过</b>`
          : `<span class="fail">❌ 测试 7 [UTF-16LE 可逆性]</span> — <b>不通过</b>`);
        if (!ok) allPassed = false;
      }

      // 测试 8：空字符串编码结果为空
      {
        const emptyUtf8 = encodeUTF8('');
        const ok = emptyUtf8.length === 0;
        lines.push(ok
          ? `<span class="pass">✅ 测试 8 [空字符串]</span> — 空字符串编码为 0 字节，<b>通过</b>`
          : `<span class="fail">❌ 测试 8 [空字符串]</span> — <b>不通过</b>`);
        if (!ok) allPassed = false;
      }

      // 汇总
      const passCount = lines.filter(l => l.includes('<span class="pass">')).length;
      const totalTests = lines.length;
      const statusColor = allPassed ? 'pass' : 'fail';
      const statusText = allPassed ? '全部通过' : `${passCount}/${totalTests} 通过`;

      testPanel.innerHTML = `
        <div style="margin-bottom:10px;font-size:0.9rem;font-weight:700;color:var(--color-${statusColor === 'pass' ? 'accent-dark' : 'primary'});">
          ${allPassed ? '🎉' : '⚠️'} 测试结果: ${statusText}
        </div>
        ${lines.join('<br>')}
      `;
      testPanel.classList.add('visible');
    });

    // 辅助：统计代理对数量
    function countSurrogates(str) {
      let count = 0;
      for (let i = 0; i < str.length; i++) {
        if (str.charCodeAt(i) >= 0xD800 && str.charCodeAt(i) <= 0xDFFF) count++;
        if (count > 0 && str.charCodeAt(i) >= 0xD800 && str.charCodeAt(i) <= 0xDBFF && i + 1 < str.length && str.charCodeAt(i + 1) >= 0xDC00 && str.charCodeAt(i + 1) <= 0xDFFF) i++;
      }
      return count;
    }
  })();
  </script>
</body>
