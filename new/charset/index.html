<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字符编码查看器</title>
  <link rel="stylesheet" href="../src/css/common.css">
  <style>
    /* ========== 页面特有样式 ========== */

    /* Hero 区 — 与首页风格一致 */
    .hero {
      text-align: center;
      padding: 80px 24px 40px;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-border), transparent);
    }
    .hero__badge {
      display: inline-block;
      padding: 6px 18px;
      background: rgba(224,122,95,0.1);
      color: var(--color-primary);
      border-radius: var(--radius-full);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
    }
    .hero__title {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--color-secondary);
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .hero__desc {
      font-size: 0.95rem;
      color: var(--color-text-light);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.8;
    }

    /* 内容区 */
    .charset-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* 输入卡片 */
    .input-card {
      background: var(--color-card);
      border-radius: var(--radius-xl);
      padding: 28px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      margin-bottom: 24px;
      transition: box-shadow var(--duration-normal) var(--ease-out-expo);
    }
    .input-card:hover {
      box-shadow: var(--shadow-md);
    }
    .input-card textarea {
      font-size: 1rem;
      padding: 18px 20px;
      resize: vertical;
      min-height: 72px;
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
    }
    .input-card textarea::placeholder {
      color: var(--color-text-muted);
      font-style: italic;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* 提示条 */
    .api-notice {
      display: none;
      margin-bottom: 24px;
      padding: 14px 20px;
      background: linear-gradient(135deg, rgba(224, 122, 95, 0.06), rgba(242, 204, 143, 0.08));
      border: 1px solid var(--color-primary-light);
      border-radius: var(--radius-lg);
      font-size: 0.85rem;
      color: var(--color-text-light);
      line-height: 1.6;
    }
    .api-notice.visible { display: block; animation: fadeInUp 0.4s var(--ease-out-expo) both; }

    /* 统计卡片行 — 与首页 page-grid 风格一致 */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: 20px 12px 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      text-align: center;
      transition: all 0.35s var(--ease-out-expo);
      position: relative;
      overflow: hidden;
    }
    .summary-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: var(--accent, var(--color-primary));
      transition: height 0.25s var(--ease-out-expo);
    }
    .summary-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .summary-card:hover::before { height: 5px; }
    .summary-card__number {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--color-primary);
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }
    .summary-card__label {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      margin-top: 8px;
      font-weight: 500;
    }

    /* 编码结果卡片 — 与首页 page-card 风格一致 */
    .results { display: none; }
    .results.visible { display: block; }

    .enc-group {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      overflow: hidden;
      transition: all 0.35s var(--ease-out-expo);
      position: relative;
    }
    .enc-group::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--group-accent, var(--color-primary));
      transition: height 0.25s var(--ease-out-expo);
    }
    .enc-group:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }
    .enc-group:hover::before { height: 4px; }

    .enc-group__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border);
    }
    .enc-group__badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .enc-group__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .enc-group__name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-secondary);
    }
    .enc-group__meta {
      font-size: 0.78rem;
      color: var(--color-text-muted);
      white-space: nowrap;
    }
    .enc-group__body {
      padding: 16px 20px;
    }
    .enc-group__line {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--color-text);
      background: var(--color-bg-warm);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      word-break: break-all;
      line-height: 1.8;
      margin-bottom: 8px;
      border: 1px solid var(--color-border);
    }
    .enc-group__line:last-child { margin-bottom: 0; }
    .enc-group__line .label {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
      background: rgba(224, 122, 95, 0.08);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      margin-right: 8px;
      vertical-align: middle;
    }

    /* 编码颜色 */
    .dot-utf8 { background: var(--color-primary); }
    .dot-utf16 { background: var(--color-accent); }
    .dot-ascii { background: var(--color-secondary); }

    /* 测试结果面板 */
    .test-panel {
      display: none;
      margin-top: 24px;
      background: var(--color-card);
      border-radius: var(--radius-xl);
      padding: 28px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      line-height: 2;
      transition: box-shadow var(--duration-normal) var(--ease-out-expo);
    }
    .test-panel:hover { box-shadow: var(--shadow-md); }
    .test-panel.visible { display: block; animation: fadeInUp 0.5s var(--ease-out-expo) both; }
    .test-panel__title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .test-panel__item {
      padding: 8px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .test-panel__item:last-child { border-bottom: none; }
    .test-panel .pass { color: var(--color-accent-dark); font-weight: 600; }
    .test-panel .fail { color: var(--color-primary); font-weight: 600; }
    .test-panel .skip { color: var(--color-text-muted); }

    /* 响应式 */
    @media (max-width: 640px) {
      .hero__title { font-size: 1.8rem; }
      .hero { padding: 50px 16px 30px; }
      .charset-container { padding: 0 16px 60px; }
      .input-card { padding: 20px; }
      .summary-row { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .summary-card { padding: 16px 8px 12px; }
      .summary-card__number { font-size: 1.4rem; }
      .enc-group__header { flex-direction: column; align-items: flex-start; gap: 6px; }
      .enc-group__body { padding: 12px 14px; }
      .test-panel { padding: 20px; }
    }
  </style>
</head>
<body data-nav-current="index">

  <!-- ========== Hero ========== -->
  <section class="hero">
    <div class="hero__badge">🔤 CHARACTER ENCODER</div>
    <h1 class="hero__title">字符编码查看器</h1>
    <p class="hero__desc">输入文本，直观查看不同编码下的字节序列与长度对比。</p>
  </section>

  <div class="charset-container">

    <!-- 输入卡片 -->
    <div class="input-card">
      <textarea class="input" id="textInput" placeholder="在这里输入文本，查看编码效果…" rows="3"></textarea>
      <div class="btn-row">
        <button class="btn btn--primary btn-encode" id="btnEncode">查看编码</button>
        <button class="btn btn--secondary" id="btnAutoTest">自动测试</button>
      </div>
    </div>

    <!-- 提示条 -->
    <div class="api-notice" id="apiNotice">
      ℹ️ GBK / Big5 / Shift_JIS 等编码无法在浏览器原生获取精确结果，已自动切换为 UTF-8 / UTF-16LE / ASCII 三种可靠编码。
    </div>

    <!-- 统计 + 结果 -->
    <div class="results" id="results">
      <div class="summary-row" id="charSummary"></div>
      <div id="encDetails"></div>
    </div>

    <!-- 测试结果 -->
    <div class="test-panel" id="testPanel"></div>

  </div>

  <script src="../src/js/nav.js"></script>

  <script>
  (function () {
    'use strict';

    const textInput = document.getElementById('textInput');
    const btnEncode = document.getElementById('btnEncode');
    const btnAutoTest = document.getElementById('btnAutoTest');
    const results = document.getElementById('results');
    const charSummary = document.getElementById('charSummary');
    const encDetails = document.getElementById('encDetails');
    const testPanel = document.getElementById('testPanel');
    const apiNotice = document.getElementById('apiNotice');

    // ---- 编码工具 ----
    function encodeUTF8(str) { return new TextEncoder().encode(str); }
    function encodeUTF16LE(str) { return new TextEncoder().encode(str); }
    function encodeASCII(str) {
      const bytes = [];
      for (let i = 0; i < str.length; i++) {
        const code = str.charCodeAt(i);
        bytes.push(code <= 127 ? code : 0x3F);
      }
      return bytes;
    }
    function bytesToHex(bytes) {
      return Array.from(bytes).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
    }
    function bytesToDec(bytes) {
      return Array.from(bytes).join(', ');
    }
    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ---- 渲染编码组 ----
    const dotClass = { 'UTF-8': 'dot-utf8', 'UTF-16 LE': 'dot-utf16', 'ASCII': 'dot-ascii' };
    const groupAccent = { 'UTF-8': 'var(--color-primary)', 'UTF-16 LE': 'var(--color-accent)', 'ASCII': 'var(--color-secondary)' };
    function renderEncGroup(name, info, bytes) {
      return `
        <div class="enc-group" style="--group-accent: ${groupAccent[name] || 'var(--color-primary)'}">
          <div class="enc-group__header">
            <span class="enc-group__badge">
              <span class="enc-group__dot ${dotClass[name] || ''}"></span>
              <span class="enc-group__name">${name}</span>
            </span>
            <span class="enc-group__meta">${bytes.length} 字节 &middot; ${info}</span>
          </div>
          <div class="enc-group__body">
            <div class="enc-group__line"><span class="label">HEX</span> ${escapeHtml(bytesToHex(bytes))}</div>
            <div class="enc-group__line"><span class="label">DEC</span> ${escapeHtml(bytesToDec(bytes))}</div>
          </div>
        </div>`;
    }

    // ---- 主逻辑 ----
    btnEncode.addEventListener('click', function () {
      const text = textInput.value;
      if (!text) return;

      const len = text.length;
      const byteCount = new Blob([text]).size;
      const utf8Bytes = encodeUTF8(text);
      const utf16Bytes = encodeUTF16LE(text);
      const asciiBytes = encodeASCII(text);

      const accentColors = ['var(--color-primary)', 'var(--color-accent)', 'var(--color-primary-light)', 'var(--color-secondary)', 'var(--color-accent-light)'];

      charSummary.innerHTML = `
        <div class="summary-card" style="--accent: ${accentColors[0]}"><div class="summary-card__number">${len}</div><div class="summary-card__label">字符数</div></div>
        <div class="summary-card" style="--accent: ${accentColors[1]}"><div class="summary-card__number">${utf8Bytes.length}</div><div class="summary-card__label">UTF-8 字节</div></div>
        <div class="summary-card" style="--accent: ${accentColors[2]}"><div class="summary-card__number">${utf16Bytes.length}</div><div class="summary-card__label">UTF-16 字节</div></div>
        <div class="summary-card" style="--accent: ${accentColors[3]}"><div class="summary-card__number">${asciiBytes.length}</div><div class="summary-card__label">ASCII 字节</div></div>
        <div class="summary-card" style="--accent: ${accentColors[4]}"><div class="summary-card__number">${byteCount}</div><div class="summary-card__label">Blob 验证</div></div>`;

      encDetails.innerHTML =
        renderEncGroup('UTF-8', '变长编码，1~4 字节/字符，Web 标准', utf8Bytes) +
        renderEncGroup('UTF-16 LE', '固定 2 字节/字符（BMP）或 4 字节（辅助平面）', utf16Bytes) +
        renderEncGroup('ASCII', '仅 0x00~0x7F，非 ASCII 用 ? 替代', asciiBytes);

      results.classList.add('visible');
      testPanel.classList.remove('visible');
      testPanel.innerHTML = '';
      apiNotice.classList.add('visible');
    });

    // ---- 自动测试 ----
    btnAutoTest.addEventListener('click', function () {
      const text = textInput.value;
      if (!text) {
        testPanel.innerHTML = '<div class="test-panel__title" style="color:var(--color-primary)">请先输入测试文本</div>';
        testPanel.classList.add('visible');
        return;
      }

      const utf8Bytes = encodeUTF8(text);
      const utf16Bytes = encodeUTF16LE(text);
      const blobBytes = new Blob([text]).size;
      let lines = [];
      let allPassed = true;

      function addTest(desc, ok) {
        const cls = ok ? 'pass' : 'fail';
        const icon = ok ? '✅' : '❌';
        lines.push(`<div class="test-panel__item"><span class="${cls}">${icon} ${desc}</span></div>`);
        if (!ok) allPassed = false;
      }

      addTest(`UTF-8 字节数 ${utf8Bytes.length} = Blob ${blobBytes}`, utf8Bytes.length === blobBytes);

      const charArr = Array.from(text);
      const expected = charArr.reduce(function (sum, ch) {
        const cp = ch.codePointAt(0);
        return sum + (cp <= 0xFFFF ? 2 : 4);
      }, 0);
      addTest(`UTF-16LE 字节数 ${utf16Bytes.length} = 预期 ${expected}`, utf16Bytes.length === expected);

      let total = 0;
      for (let i = 0; i < text.length; i++) total += new TextEncoder().encode(text[i]).length;
      addTest('ASCII 单字节逐个编码一致', total === utf8Bytes.length);

      lines.push('<div class="test-panel__item"><span class="skip">ℹ GBK 无原生 API，已跳过</span></div>');

      const asciiEnc = encodeASCII(text);
      let ok = true, j = 0;
      for (let i = 0; i < text.length; i++) {
        const cp = text.charCodeAt(i);
        if (cp <= 0x7F) { if (asciiEnc[j] !== cp) { ok = false; break; } j++; }
      }
      addTest('ASCII 编码各占 1 字节', ok);

      addTest('UTF-8 编码→解码恢复原文', new TextDecoder('utf-8').decode(utf8Bytes) === text);
      addTest('UTF-16LE 编码→解码恢复原文', new TextDecoder('utf-16le').decode(utf16Bytes) === text);
      addTest('空字符串编码为 0 字节', encodeUTF8('').length === 0);

      const passCount = lines.filter(l => l.includes('<span class="pass">')).length;
      const statusColor = allPassed ? 'var(--color-accent-dark)' : 'var(--color-primary)';
      const emoji = allPassed ? '🎉' : '⚠️';
      const statusText = allPassed ? '全部通过' : `${passCount}/${lines.length} 通过`;

      testPanel.innerHTML =
        `<div class="test-panel__title" style="color:${statusColor}">${emoji} 测试结果: ${statusText}</div>` +
        lines.join('');
      testPanel.classList.add('visible');
    });
  })();
  </script>
</body>
</html>
