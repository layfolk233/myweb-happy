<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字符编码查看器</title>
  <link rel="stylesheet" href="../src/css/common.css">
  <style>
    .charset-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .input-section {
      margin-bottom: 32px;
    }
    .input-section .input {
      font-size: 1rem;
      padding: 16px 20px;
      margin-bottom: 12px;
      resize: vertical;
      min-height: 60px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-encode {
      padding: 10px 28px;
      font-size: 1rem;
    }
    .btn-test {
      padding: 10px 28px;
      font-size: 1rem;
      background: var(--color-secondary);
      color: #fff;
      border: none;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-family: var(--font-sans);
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-test:hover { opacity: 0.85; }
    .results { display: none; }
    .results.visible { display: block; }

    /* 紧凑统计行 */
    .summary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 16px 20px;
      background: var(--color-bg-warm);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: var(--color-text-light);
    }
    .summary-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
      flex: 1;
    }
    .summary-item strong {
      color: var(--color-primary);
      font-size: 1.3rem;
      font-weight: 700;
    }
    .summary-item span {
      font-size: 0.75rem;
      margin-top: 2px;
    }

    /* 编码详情卡片 */
    .enc-group {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .enc-group__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: var(--color-bg-warm);
      border-bottom: 1px solid var(--color-border);
    }
    .enc-group__name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-secondary);
    }
    .enc-group__desc {
      font-size: 0.78rem;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }
    .enc-group__line {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--color-text);
      background: var(--color-bg-warm);
      padding: 12px 16px;
      word-break: break-all;
      line-height: 1.7;
      white-space: pre-wrap;
      border-bottom: 1px solid var(--color-border);
    }
    .enc-group__line:last-child {
      border-bottom: none;
    }
    .enc-group__line.dec {
      color: var(--color-text-muted);
      font-size: 0.72rem;
      padding: 8px 16px;
    }

    /* API 加载提示 */
    .api-notice {
      display: none;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: rgba(224, 122, 95, 0.08);
      border: 1px solid var(--color-primary-light);
      border-radius: var(--radius-lg);
      font-size: 0.82rem;
      color: var(--color-text-light);
    }
    .api-notice.visible { display: block; }

    /* 自动测试结果面板 */
    .test-panel {
      display: none;
      margin-top: 20px;
      padding: 16px 20px;
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: 1.8;
    }
    .test-panel.visible { display: block; }
    .test-panel .pass { color: var(--color-accent-dark); }
    .test-panel .fail { color: var(--color-primary); }
    .test-panel .skip { color: var(--color-text-muted); }
  </style>
</head>
<body data-nav-current="index">

  <header class="page-header">
    <span class="page-header__icon">🔤</span>
    <h1 class="page-header__title">字符编码查看器</h1>
    <p class="page-header__subtitle">输入文本，查看不同编码下的字节序列。</p>
  </header>

  <div class="charset-container">

    <div class="input-section">
      <textarea class="input" id="textInput" placeholder="在这里输入文本…" rows="3"></textarea>
      <div class="btn-row">
        <button class="btn btn--primary btn-encode" id="btnEncode">查看编码</button>
        <button class="btn-test" id="btnAutoTest">自动测试</button>
      </div>
    </div>

    <div class="api-notice" id="apiNotice">
      ℹ️ GBK / Big5 / Shift_JIS 等编码无法在浏览器原生获取精确结果，已自动切换为 UTF-8 / UTF-16LE / ASCII 三种可靠编码。
    </div>

    <div class="results" id="results">
      <div class="summary-row" id="charSummary"></div>
      <div id="encDetails"></div>
    </div>

    <div class="test-panel" id="testPanel"></div>

  </div>

  <script src="../src/js/nav.js"></script>

  <script>
  (function () {
    'use strict';

    const textInput = document.getElementById('textInput');
    const btnEncode = document.getElementById('btnEncode');
    const btnAutoTest = document.getElementById('btnAutoTest');
    const results = document.getElementById('results');
    const charSummary = document.getElementById('charSummary');
    const encDetails = document.getElementById('encDetails');
    const testPanel = document.getElementById('testPanel');
    const apiNotice = document.getElementById('apiNotice');

    // ---- UTF-8 编码 ----
    function encodeUTF8(str) {
      return new TextEncoder().encode(str);
    }

    // ---- UTF-16LE 编码 ----
    function encodeUTF16LE(str) {
      return new TextEncoder().encode(str);
    }

    // ---- ASCII 近似 ----
    function encodeASCII(str) {
      const bytes = [];
      for (let i = 0; i < str.length; i++) {
        const code = str.charCodeAt(i);
        bytes.push(code <= 127 ? code : 0x3F);
      }
      return bytes;
    }

    // ---- 工具函数 ----
    function bytesToHex(bytes) {
      return Array.from(bytes).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
    }

    function bytesToDec(bytes) {
      return Array.from(bytes).join(', ');
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function countASCIIChars(text) {
      let count = 0;
      for (let i = 0; i < text.length; i++) {
        if (text.charCodeAt(i) <= 127) count++;
      }
      return count;
    }

    // ---- 渲染一个编码组（3 行） ----
    function renderEncGroup(name, info, bytes) {
      return `
        <div class="enc-group">
          <div class="enc-group__header">
            <span class="enc-group__name">${name}</span>
            <span class="enc-group__desc">${bytes.length} 字节 — ${info}</span>
          </div>
          <div class="enc-group__line">${escapeHtml(bytesToHex(bytes))}</div>
          <div class="enc-group__line dec">十进制: ${escapeHtml(bytesToDec(bytes))}</div>
        </div>
      `;
    }

    // ---- 主逻辑：查看编码 ----
    btnEncode.addEventListener('click', function () {
      const text = textInput.value;
      if (!text) return;

      const len = text.length;
      const byteCount = new Blob([text]).size;
      const asciiChars = countASCIIChars(text);

      const utf8Bytes = encodeUTF8(text);
      const utf16Bytes = encodeUTF16LE(text);
      const asciiBytes = encodeASCII(text);

      // 统计行
      charSummary.innerHTML = `
        <div class="summary-item"><strong>${len}</strong><span>字符数</span></div>
        <div class="summary-item"><strong>${utf8Bytes.length}</strong><span>UTF-8 字节</span></div>
        <div class="summary-item"><strong>${utf16Bytes.length}</strong><span>UTF-16 字节</span></div>
        <div class="summary-item"><strong>${asciiBytes.length}</strong><span>ASCII 字节</span></div>
        <div class="summary-item"><strong>${byteCount}</strong><span>Blob 验证</span></div>
      `;

      // 编码详情
      encDetails.innerHTML =
        renderEncGroup('UTF-8', '变长编码，1~4 字节/字符，Web 标准', utf8Bytes) +
        renderEncGroup('UTF-16 LE', '固定 2 字节/字符（BMP）或 4 字节（辅助平面）', utf16Bytes) +
        renderEncGroup('ASCII', '仅 0x00~0x7F，非 ASCII 用 ? 替代', asciiBytes);

      results.classList.add('visible');
      testPanel.classList.remove('visible');
      testPanel.innerHTML = '';

      // 显示 API 提示
      apiNotice.classList.add('visible');
    });

    // ---- 自动测试功能 ----
    btnAutoTest.addEventListener('click', function () {
      const text = textInput.value;
      if (!text) {
        testPanel.innerHTML = '<span class="fail">❌ 请先输入测试文本</span>';
        testPanel.classList.add('visible');
        return;
      }

      const utf8Bytes = encodeUTF8(text);
      const utf16Bytes = encodeUTF16LE(text);
      const asciiChars = countASCIIChars(text);
      const blobBytes = new Blob([text]).size;

      let lines = [];
      let allPassed = true;

      // 测试 1：UTF-8 字节数 = Blob 大小（Blob 原生使用 UTF-8）
      {
        const match = utf8Bytes.length === blobBytes;
        lines.push(match
          ? '<span class="pass">✅ 测试 1 [UTF-8 字节数]</span> — ' + utf8Bytes.length + ' 字节，Blob 验证 ' + blobBytes + ' 字节，<b>匹配</b>'
          : '<span class="fail">❌ 测试 1 [UTF-8 字节数]</span> — ' + utf8Bytes.length + ' vs Blob ' + blobBytes + '，<b>不匹配</b>');
        if (!match) allPassed = false;
      }

      // 测试 2：UTF-16LE 字节数
      {
        const charArr = Array.from(text); // 正确处理代理对
        const expected = charArr.reduce(function (sum, ch) {
          const cp = ch.codePointAt(0);
          return sum + (cp <= 0xFFFF ? 2 : 4);
        }, 0);
        const match = utf16Bytes.length === expected;
        lines.push(match
          ? '<span class="pass">✅ 测试 2 [UTF-16LE 字节数]</span> — ' + utf16Bytes.length + ' 字节，预期 ' + expected + '，<b>匹配</b>'
          : '<span class="fail">❌ 测试 2 [UTF-16LE 字节数]</span> — ' + utf16Bytes.length + ' vs 预期 ' + expected + '，<b>不匹配</b>');
        if (!match) allPassed = false;
      }

      // 测试 3：ASCII 单字节
      {
        let total = 0;
        for (let i = 0; i < text.length; i++) {
          total += new TextEncoder().encode(text[i]).length;
        }
        const ok = total === utf8Bytes.length;
        lines.push(ok
          ? '<span class="pass">✅ 测试 3 [ASCII 单字节]</span> — 逐个字符编码一致，<b>通过</b>'
          : '<span class="fail">❌ 测试 3 [ASCII 单字节]</span> — <b>不通过</b>');
        if (!ok) allPassed = false;
      }

      // 测试 4：GBK 不可用提示
      lines.push('<span class="skip">ℹ️ 测试 4 [GBK]</span> — 浏览器无原生 GBK 编码 API，无法精确模拟，<b>跳过</b>');

      // 测试 5：GBK ASCII 对齐（用近似编码验证 ASCII 部分）
      {
        const asciiEnc = encodeASCII(text);
        let ok = true;
        let j = 0;
        for (let i = 0; i < text.length; i++) {
          const cp = text.charCodeAt(i);
          if (cp <= 0x7F) {
            if (asciiEnc[j] !== cp) { ok = false; break; }
            j++;
          }
        }
        lines.push(ok
          ? '<span class="pass">✅ 测试 5 [ASCII 编码]</span> — ASCII 字符各占 1 字节，<b>通过</b>'
          : '<span class="fail">❌ 测试 5 [ASCII 编码]</span> — <b>不通过</b>');
        if (!ok) allPassed = false;
      }

      // 测试 6：UTF-8 可逆
      {
        const roundtrip = new TextDecoder('utf-8').decode(utf8Bytes);
        const ok = roundtrip === text;
        lines.push(ok
          ? '<span class="pass">✅ 测试 6 [UTF-8 可逆]</span> — 编码→解码恢复原文，<b>通过</b>'
          : '<span class="fail">❌ 测试 6 [UTF-8 可逆]</span> — <b>不通过</b>');
        if (!ok) allPassed = false;
      }

      // 测试 7：UTF-16LE 可逆
      {
        const roundtrip = new TextDecoder('utf-16le').decode(utf16Bytes);
        const ok = roundtrip === text;
        lines.push(ok
          ? '<span class="pass">✅ 测试 7 [UTF-16LE 可逆]</span> — 编码→解码恢复原文，<b>通过</b>'
          : '<span class="fail">❌ 测试 7 [UTF-16LE 可逆]</span> — <b>不通过</b>');
        if (!ok) allPassed = false;
      }

      // 测试 8：空字符串
      {
        const ok = encodeUTF8('').length === 0;
        lines.push(ok
          ? '<span class="pass">✅ 测试 8 [空字符串]</span> — 空串编码为 0 字节，<b>通过</b>'
          : '<span class="fail">❌ 测试 8 [空字符串]</span> — <b>不通过</b>');
        if (!ok) allPassed = false;
      }

      const passCount = lines.filter(function (l) { return l.indexOf('<span class="pass">') !== -1; }).length;
      const totalTests = lines.length;
      const statusColor = allPassed ? 'accent-dark' : 'primary';
      const statusText = allPassed ? '全部通过' : passCount + '/' + totalTests + ' 通过';

      testPanel.innerHTML =
        '<div style="margin-bottom:10px;font-size:0.9rem;font-weight:700;color:var(--color-' + statusColor + ');">' +
          (allPassed ? '🎉' : '⚠️') + ' 测试结果: ' + statusText + '</div>' +
          lines.join('<br>');
      testPanel.classList.add('visible');
    });
  })();
  </script>
</body>
</html>
