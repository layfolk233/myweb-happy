<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字符编码查看器</title>
  <link rel="stylesheet" href="../src/css/common.css">
  <style>
    /* ========== 页面特有样式 ========== */

    /* Hero 区 */
    .hero {
      text-align: center;
      padding: 80px 24px 40px;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--color-border), transparent);
    }
    .hero__badge {
      display: inline-block;
      padding: 6px 18px;
      background: rgba(224,122,95,0.1);
      color: var(--color-primary);
      border-radius: var(--radius-full);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 24px;
    }
    .hero__title {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--color-secondary);
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .hero__desc {
      font-size: 0.95rem;
      color: var(--color-text-light);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.8;
    }

    /* 内容容器 */
    .charset-body {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* 输入卡片 */
    .input-card {
      background: var(--color-card);
      border-radius: var(--radius-xl);
      padding: 28px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      margin-bottom: 24px;
      transition: box-shadow var(--duration-normal) var(--ease-out-expo);
    }
    .input-card:hover {
      box-shadow: var(--shadow-md);
    }
    .input-card .input {
      font-size: 1rem;
      padding: 18px 20px;
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* 提示条 */
    .api-notice {
      display: none;
      margin-bottom: 24px;
      padding: 14px 20px;
      background: linear-gradient(135deg, rgba(224,122,95,0.06), rgba(242,204,143,0.08));
      border: 1px solid var(--color-primary-light);
      border-radius: var(--radius-lg);
      font-size: 0.85rem;
      color: var(--color-text-light);
      line-height: 1.6;
    }
    .api-notice.visible { display: block; animation: fadeInUp 0.4s var(--ease-out-expo) both; }

    /* 统计卡片 — 复用 common.css 的 .card 风格 */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      padding: 20px 12px 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      text-align: center;
      transition: all 0.35s var(--ease-out-expo);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: var(--accent, var(--color-primary));
      transition: height 0.25s var(--ease-out-expo);
    }
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }
    .stat-card:hover::before { height: 5px; }
    .stat-card__num {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--color-primary);
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }
    .stat-card__lbl {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      margin-top: 8px;
      font-weight: 500;
    }

    /* 编码结果 */
    .results { display: none; }
    .results.visible { display: block; }

    .enc-block {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      overflow: hidden;
      transition: all 0.35s var(--ease-out-expo);
      position: relative;
    }
    .enc-block::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--bar, var(--color-primary));
      transition: height 0.25s var(--ease-out-expo);
    }
    .enc-block:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }
    .enc-block:hover::before { height: 4px; }

    .enc-block__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border);
    }
    .enc-block__title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-secondary);
    }
    .enc-block__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .enc-block__meta {
      font-size: 0.78rem;
      color: var(--color-text-muted);
      white-space: nowrap;
    }
    .enc-block__body {
      padding: 16px 20px;
    }
    .enc-block__row {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--color-text);
      background: var(--color-bg-warm);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      word-break: break-all;
      line-height: 1.8;
      margin-bottom: 8px;
      border: 1px solid var(--color-border);
    }
    .enc-block__row:last-child { margin-bottom: 0; }
    .enc-block__row .tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
      background: rgba(224,122,95,0.08);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      margin-right: 8px;
      vertical-align: middle;
    }

    /* 编码颜色 */
    .dot-primary { background: var(--color-primary); }
    .dot-accent  { background: var(--color-accent); }
    .dot-secondary { background: var(--color-secondary); }

    /* 测试结果 */
    .test-card {
      display: none;
      margin-top: 24px;
      background: var(--color-card);
      border-radius: var(--radius-xl);
      padding: 28px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
      font-size: 0.9rem;
      line-height: 2;
      transition: box-shadow var(--duration-normal) var(--ease-out-expo);
    }
    .test-card:hover { box-shadow: var(--shadow-md); }
    .test-card.visible { display: block; animation: fadeInUp 0.5s var(--ease-out-expo) both; }
    .test-card__title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .test-card__item {
      padding: 8px 0;
      border-bottom: 1px solid var(--color-border);
    }
    .test-card__item:last-child { border-bottom: none; }
    .test-card .pass { color: var(--color-accent-dark); font-weight: 600; }
    .test-card .fail { color: var(--color-primary); font-weight: 600; }
    .test-card .skip { color: var(--color-text-muted); }

    /* 响应式 */
    @media (max-width: 640px) {
      .hero__title { font-size: 1.8rem; }
      .hero { padding: 50px 16px 30px; }
      .charset-body { padding: 0 16px 60px; }
      .input-card { padding: 20px; }
      .summary-row { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .stat-card { padding: 16px 8px 12px; }
      .stat-card__num { font-size: 1.4rem; }
      .enc-block__head { flex-direction: column; align-items: flex-start; gap: 6px; }
      .enc-block__body { padding: 12px 14px; }
      .test-card { padding: 20px; }
    }
  </style>
</head>
<body data-nav-current="charset">

  <!-- Hero -->
  <section class="hero">
    <div class="hero__badge">🔤 CHARACTER ENCODER</div>
    <h1 class="hero__title">字符编码查看器</h1>
    <p class="hero__desc">输入文本，直观查看不同编码下的字节序列与长度对比。</p>
  </section>

  <div class="charset-body">

    <!-- 输入卡片 -->
    <div class="input-card">
      <textarea class="input" id="textInput" placeholder="在这里输入文本，查看编码效果…" rows="3"></textarea>
      <div class="btn-row">
        <button class="btn btn--primary" id="btnEncode">查看编码</button>
        <button class="btn btn--secondary" id="btnAutoTest">自动测试</button>
      </div>
    </div>

    <!-- 提示条 -->
    <div class="api-notice" id="apiNotice">
      ℹ️ GBK / Big5 / Shift_JIS 等编码无法在浏览器原生获取精确结果，已自动切换为 UTF-8 / UTF-16LE / ASCII 三种可靠编码。
    </div>

    <!-- 统计 + 结果 -->
    <div class="results" id="results">
      <div class="summary-row" id="charSummary"></div>
      <div id="encDetails"></div>
    </div>

    <!-- 测试结果 -->
    <div class="test-card" id="testCard"></div>

  </div>

  <script src="../src/js/nav.js"></script>

  <script>
  (function () {
    'use strict';

    const textInput = document.getElementById('textInput');
    const btnEncode = document.getElementById('btnEncode');
    const btnAutoTest = document.getElementById('btnAutoTest');
    const results = document.getElementById('results');
    const charSummary = document.getElementById('charSummary');
    const encDetails = document.getElementById('encDetails');
    const testCard = document.getElementById('testCard');
    const apiNotice = document.getElementById('apiNotice');

    // ---- 编码工具 ----
    function encodeUTF8(str) { return new TextEncoder().encode(str); }
    function encodeUTF16LE(str) { return new TextEncoder().encode(str); }
    function encodeASCII(str) {
      const bytes = [];
      for (let i = 0; i < str.length; i++) {
        const code = str.charCodeAt(i);
        bytes.push(code <= 127 ? code : 0x3F);
      }
      return bytes;
    }
    function bytesToHex(bytes) {
      return Array.from(bytes).map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
    }
    function bytesToDec(bytes) {
      return Array.from(bytes).join(', ');
    }
    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ---- 渲染编码组 ----
    const dotMap = { 'UTF-8': 'dot-primary', 'UTF-16 LE': 'dot-accent', 'ASCII': 'dot-secondary' };
    const barMap = { 'UTF-8': 'var(--color-primary)', 'UTF-16 LE': 'var(--color-accent)', 'ASCII': 'var(--color-secondary)' };
    function renderEnc(name, desc, bytes) {
      return `
        <div class="enc-block" style="--bar: ${barMap[name] || 'var(--color-primary)'}">
          <div class="enc-block__head">
            <span class="enc-block__title">
              <span class="enc-block__dot ${dotMap[name] || ''}"></span>
              ${name}
            </span>
            <span class="enc-block__meta">${bytes.length} 字节 &middot; ${desc}</span>
          </div>
          <div class="enc-block__body">
            <div class="enc-block__row"><span class="tag">HEX</span> ${escapeHtml(bytesToHex(bytes))}</div>
            <div class="enc-block__row"><span class="tag">DEC</span> ${escapeHtml(bytesToDec(bytes))}</div>
          </div>
        </div>`;
    }

    // ---- 主逻辑 ----
    btnEncode.addEventListener('click', function () {
      const text = textInput.value;
      if (!text) return;

      const len = text.length;
      const blobBytes = new Blob([text]).size;
      const u8 = encodeUTF8(text);
      const u16 = encodeUTF16LE(text);
      const a7 = encodeASCII(text);

      const accents = [
        'var(--color-primary)',
        'var(--color-accent)',
        'var(--color-primary-light)',
        'var(--color-secondary)',
        'var(--color-accent-light)'
      ];

      charSummary.innerHTML = `
        <div class="stat-card" style="--accent:${accents[0]}"><div class="stat-card__num">${len}</div><div class="stat-card__lbl">字符数</div></div>
        <div class="stat-card" style="--accent:${accents[1]}"><div class="stat-card__num">${u8.length}</div><div class="stat-card__lbl">UTF-8 字节</div></div>
        <div class="stat-card" style="--accent:${accents[2]}"><div class="stat-card__num">${u16.length}</div><div class="stat-card__lbl">UTF-16 字节</div></div>
        <div class="stat-card" style="--accent:${accents[3]}"><div class="stat-card__num">${a7.length}</div><div class="stat-card__lbl">ASCII 字节</div></div>
        <div class="stat-card" style="--accent:${accents[4]}"><div class="stat-card__num">${blobBytes}</div><div class="stat-card__lbl">Blob 验证</div></div>`;

      encDetails.innerHTML =
        renderEnc('UTF-8', '变长编码，1~4 字节/字符，Web 标准', u8) +
        renderEnc('UTF-16 LE', '固定 2 字节/字符（BMP）或 4 字节（辅助平面）', u16) +
        renderEnc('ASCII', '仅 0x00~0x7F，非 ASCII 用 ? 替代', a7);

      results.classList.add('visible');
      testCard.classList.remove('visible');
      testCard.innerHTML = '';
      apiNotice.classList.add('visible');
    });

    // ---- 自动测试 ----
    btnAutoTest.addEventListener('click', function () {
      const text = textInput.value;
      if (!text) {
        testCard.innerHTML = '<div class="test-card__title" style="color:var(--color-primary)">请先输入测试文本</div>';
        testCard.classList.add('visible');
        return;
      }

      const u8 = encodeUTF8(text);
      const u16 = encodeUTF16LE(text);
      const blobBytes = new Blob([text]).size;
      let lines = [];
      let allPassed = true;

      function addTest(desc, ok) {
        const cls = ok ? 'pass' : 'fail';
        const icon = ok ? '✅' : '❌';
        lines.push(`<div class="test-card__item"><span class="${cls}">${icon} ${desc}</span></div>`);
        if (!ok) allPassed = false;
      }

      addTest(`UTF-8 字节数 ${u8.length} = Blob ${blobBytes}`, u8.length === blobBytes);

      const charArr = Array.from(text);
      const expected = charArr.reduce(function (s, ch) {
        const cp = ch.codePointAt(0);
        return s + (cp <= 0xFFFF ? 2 : 4);
      }, 0);
      addTest(`UTF-16LE 字节数 ${u16.length} = 预期 ${expected}`, u16.length === expected);

      let total = 0;
      for (let i = 0; i < text.length; i++) total += new TextEncoder().encode(text[i]).length;
      addTest('ASCII 单字节逐个编码一致', total === u8.length);

      lines.push('<div class="test-card__item"><span class="skip">ℹ GBK 无原生 API，已跳过</span></div>');

      const asciiEnc = encodeASCII(text);
      let ok = true, j = 0;
      for (let i = 0; i < text.length; i++) {
        const cp = text.charCodeAt(i);
        if (cp <= 0x7F) { if (asciiEnc[j] !== cp) { ok = false; break; } j++; }
      }
      addTest('ASCII 编码各占 1 字节', ok);

      addTest('UTF-8 编码→解码恢复原文', new TextDecoder('utf-8').decode(u8) === text);
      addTest('UTF-16LE 编码→解码恢复原文', new TextDecoder('utf-16le').decode(u16) === text);
      addTest('空字符串编码为 0 字节', encodeUTF8('').length === 0);

      const passCount = lines.filter(l => l.includes('<span class="pass">')).length;
      const statusColor = allPassed ? 'var(--color-accent-dark)' : 'var(--color-primary)';
      const emoji = allPassed ? '🎉' : '⚠️';
      const statusText = allPassed ? '全部通过' : `${passCount}/${lines.length} 通过`;

      testCard.innerHTML =
        `<div class="test-card__title" style="color:${statusColor}">${emoji} 测试结果: ${statusText}</div>` +
        lines.join('');
      testCard.classList.add('visible');
    });
  })();
  </script>
</body>
</html>
