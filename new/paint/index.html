<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>画图</title>
    <link rel="stylesheet" href="../src/css/common.css">
    <style>
        .paint-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        /* ── 顶部工具栏 ── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px 14px;
            background: var(--color-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            width: 100%;
            max-width: 700px;
        }

        .toolbar__group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar__sep {
            width: 1px;
            height: 24px;
            background: var(--color-border);
        }

        .tool-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            height: 36px;
            padding: 0 12px;
            border: 2px solid transparent;
            border-radius: var(--radius-sm);
            background: var(--color-bg);
            color: var(--color-text);
            font-size: 16px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.15s var(--ease-out-expo);
        }

        .tool-btn:hover {
            background: var(--color-primary-light);
        }

        .tool-btn.active {
            border-color: var(--color-primary);
            background: var(--color-primary-light);
            font-weight: 600;
        }

        .color-btn {
            width: 36px;
            height: 36px;
            border: 2px solid var(--color-border);
            border-radius: 50%;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.15s var(--ease-spring);
        }

        .color-btn:hover {
            transform: scale(1.15);
        }

        .size-input {
            width: 48px;
            height: 36px;
            text-align: center;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--color-text);
            background: var(--color-bg);
            outline: none;
        }

        .size-input:focus {
            border-color: var(--color-primary);
        }

        .size-label {
            font-size: 13px;
            color: var(--color-text-light);
            white-space: nowrap;
        }

        .btn-clear {
            height: 36px;
            padding: 0 16px;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-sm);
            background: var(--color-bg);
            color: var(--color-text-light);
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.15s var(--ease-out-expo);
        }

        .btn-clear:hover {
            background: #ff6b6b;
            border-color: #ff6b6b;
            color: #fff;
        }

        /* ── 画布区域 ── */
        .canvas-wrap {
            flex-shrink: 0;
            padding: 12px;
            background: #ffffff;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
        }

        #paintCanvas {
            display: block;
            background: #ffffff;
            cursor: crosshair;
            touch-action: none;
        }

        /* ── 颜色弹窗 ── */
        .color-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .color-overlay.show {
            display: flex;
        }

        .color-picker-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 24px 32px;
            background: var(--color-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }

        .color-picker-wrap label {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text);
        }

        .color-picker-wrap input[type="color"] {
            width: 80px;
            height: 50px;
            border: 2px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
        }

        .color-picker-wrap .btn-done {
            padding: 8px 28px;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body data-nav-current="paint">
    <header class="page-header">
        <span class="page-header__icon">🎨</span>
        <h1 class="page-header__title">画图</h1>
        <p class="page-header__subtitle">点击画布上色，拖拽连线。</p>
    </header>

    <div class="container">
        <div class="paint-wrapper">
            <div class="toolbar">
                <div class="toolbar__group">
                    <button class="tool-btn active" id="btnBrush" type="button" title="画笔">🖌</button>
                    <button class="tool-btn" id="btnEraser" type="button" title="橡皮擦">🧹</button>
                </div>
                <div class="toolbar__sep"></div>
                <div class="toolbar__group">
                    <button class="color-btn" id="colorBtn" style="background:#000000" title="设置颜色"></button>
                </div>
                <div class="toolbar__sep"></div>
                <div class="toolbar__group">
                    <span class="size-label">画布</span>
                    <input class="size-input" id="sizeInput" type="number" value="10" min="2" max="100" title="画布大小 (2~100)">
                </div>
                <div class="toolbar__sep"></div>
                <button class="btn-clear" id="btnClear" type="button">清空</button>
            </div>

            <div class="canvas-wrap" id="canvasWrap">
                <canvas id="paintCanvas"></canvas>
            </div>
        </div>
    </div>

    <!-- 颜色弹窗 -->
    <div class="color-overlay" id="colorOverlay">
        <div class="color-picker-wrap">
            <label>选择颜色</label>
            <input type="color" id="colorPicker" value="#000000">
            <button class="btn-done" id="colorDone">确定</button>
        </div>
    </div>

    <script src="../src/js/nav.js"></script>
    <script>(function () {
        'use strict';

        var canvas = document.getElementById('paintCanvas');
        var ctx = canvas.getContext('2d');
        var colorBtn = document.getElementById('colorBtn');
        var colorOverlay = document.getElementById('colorOverlay');
        var colorPicker = document.getElementById('colorPicker');
        var colorDone = document.getElementById('colorDone');
        var sizeInput = document.getElementById('sizeInput');
        var btnClear = document.getElementById('btnClear');
        var btnBrush = document.getElementById('btnBrush');
        var btnEraser = document.getElementById('btnEraser');
        var canvasWrap = document.getElementById('canvasWrap');

        var GRID = 10;
        var cellSize = 0;
        var color = '#000000';
        var tool = 'brush';
        var isDrawing = false;
        var lastCell = null;

        /* ── 自适应画布尺寸 ── */
        function calcSize() {
            var maxW = window.innerWidth - 40;
            var maxH = window.innerHeight - 220;
            var maxDim = Math.min(maxW, maxH);
            cellSize = Math.max(Math.floor(maxDim / GRID), 4);
            canvas.width = GRID * cellSize;
            canvas.height = GRID * cellSize;
            canvas.style.width = canvas.width + 'px';
            canvas.style.height = canvas.height + 'px';
            redraw();
        }

        function redraw() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (cellSize >= 16) drawGridLines();
        }

        function drawGridLines() {
            ctx.save();
            ctx.strokeStyle = 'rgba(0,0,0,0.08)';
            ctx.lineWidth = 1;
            for (var i = 1; i < GRID; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, 0);
                ctx.lineTo(i * cellSize, GRID * cellSize);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * cellSize);
                ctx.lineTo(GRID * cellSize, i * cellSize);
                ctx.stroke();
            }
            ctx.restore();
        }

        /* ── 坐标计算 ── */
        function getCell(clientX, clientY) {
            var rect = canvas.getBoundingClientRect();
            var x = Math.floor((clientX - rect.left) / rect.width * canvas.width / cellSize);
            var y = Math.floor((clientY - rect.top) / rect.height * canvas.height / cellSize);
            if (x < 0 || x >= GRID || y < 0 || y >= GRID) return null;
            return { x: x, y: y };
        }

        function paintCell(cell) {
            ctx.fillStyle = color;
            ctx.fillRect(cell.x * cellSize, cell.y * cellSize, cellSize, cellSize);
            if (cellSize >= 16) drawGridLines();
        }

        function eraseCell(cell) {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(cell.x * cellSize, cell.y * cellSize, cellSize, cellSize);
            if (cellSize >= 16) drawGridLines();
        }

        /* ── 输入事件 ── */
        function handleDown(cell) {
            if (!cell) return;
            isDrawing = true;
            lastCell = cell;
            if (tool === 'eraser') eraseCell(cell);
            else paintCell(cell);
        }

        function handleMove(cell) {
            if (!isDrawing || !cell || !lastCell) return;
            if (cell.x !== lastCell.x || cell.y !== lastCell.y) {
                if (tool === 'eraser') eraseCell(cell);
                else paintCell(cell);
                lastCell = cell;
            }
        }

        function handleUp() {
            isDrawing = false;
            lastCell = null;
        }

        canvas.addEventListener('mousedown', function (e) {
            e.preventDefault();
            handleDown(getCell(e.clientX, e.clientY));
        });

        canvas.addEventListener('mousemove', function (e) {
            handleMove(getCell(e.clientX, e.clientY));
        });

        canvas.addEventListener('mouseup', handleUp);
        canvas.addEventListener('mouseleave', handleUp);

        // 触摸支持
        canvas.addEventListener('touchstart', function (e) {
            e.preventDefault();
            var t = e.touches[0];
            handleDown(getCell(t.clientX, t.clientY));
        }, { passive: false });

        canvas.addEventListener('touchmove', function (e) {
            e.preventDefault();
            var t = e.touches[0];
            handleMove(getCell(t.clientX, t.clientY));
        }, { passive: false });

        canvas.addEventListener('touchend', function (e) {
            e.preventDefault();
            handleUp();
        });

        // 禁止右键菜单
        canvas.addEventListener('contextmenu', function (e) { e.preventDefault(); });

        /* ── 工具切换 ── */
        btnBrush.addEventListener('click', function () {
            tool = 'brush';
            btnBrush.classList.add('active');
            btnEraser.classList.remove('active');
        });

        btnEraser.addEventListener('click', function () {
            tool = 'eraser';
            btnEraser.classList.add('active');
            btnBrush.classList.remove('active');
        });

        /* ── 颜色弹窗 ── */
        colorBtn.addEventListener('click', function () {
            colorPicker.value = color;
            colorOverlay.classList.add('show');
        });

        colorDone.addEventListener('click', function () {
            color = colorPicker.value;
            colorBtn.style.background = color;
            colorOverlay.classList.remove('show');
        });

        colorOverlay.addEventListener('click', function (e) {
            if (e.target === colorOverlay) colorOverlay.classList.remove('show');
        });

        /* ── 画布大小 ── */
        sizeInput.addEventListener('change', function () {
            var v = parseInt(this.value, 10);
            if (isNaN(v) || v < 2) v = 2;
            if (v > 100) v = 100;
            GRID = v;
            calcSize();
        });

        /* ── 清空 ── */
        btnClear.addEventListener('click', function () { redraw(); });

        /* ── 响应窗口 ── */
        window.addEventListener('resize', calcSize);

        calcSize();
        colorBtn.style.background = color;
    })();</script>
</body>
</html>
